name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run unit tests
        run: dotnet test tests/Messentra.UnitTests/Messentra.UnitTests.csproj -r linux-x64

      - name: Run component tests
        run: dotnet test tests/Messentra.ComponentTests/Messentra.ComponentTests.csproj -r linux-x64

  publish:
    name: Publish (${{ matrix.rid }})
    needs: test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      IS_RELEASE: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: [self-hosted, Windows, X64, messentra-signing]
            rid: win-x64
          # macos-26 is a beta image (Apple Silicon arm64) - fallback is macos-15
          - os: macos-26
            rid: osx-arm64
            sign_mac: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish .NET app
        run: dotnet publish src/Messentra/Messentra.csproj /p:PublishProfile=${{ matrix.rid }}
        env:
          GH_TOKEN: ${{ env.IS_RELEASE == 'true' && secrets.GITHUB_TOKEN || '' }}
          ELECTRON_BUILDER_NO_PUBLISH: ${{ env.IS_RELEASE != 'true' }}
          CSC_LINK: ${{ matrix.sign_mac && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.sign_mac && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.sign_mac && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.sign_mac && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.sign_mac && secrets.APPLE_TEAM_ID || '' }}
