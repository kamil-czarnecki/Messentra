name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: dotnet test Messentra.slnx -r linux-x64

  publish:
    name: Publish (${{ matrix.rid }})
    needs: test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          # macos-26 is a beta image (Apple Silicon arm64) - fallback is macos-15
          - os: macos-26
            rid: osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish .NET app
        run: dotnet publish src/Messentra/Messentra.csproj /p:PublishProfile=${{ matrix.rid }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # win-x64: always skip electron-builder publish (we sign & upload manually below)
          # others: publish only on tag push
          ELECTRON_BUILDER_NO_PUBLISH: ${{ matrix.rid == 'win-x64' && 'true' || startsWith(github.ref, 'refs/tags/') && 'false' || 'true' }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Find portable EXE
        if: matrix.rid == 'win-x64'
        id: find-exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter "messentra-x64-*.exe" | Select-Object -First 1
          if (-not $exe) { throw "Could not find portable EXE in build output" }
          Write-Host "Found: $($exe.FullName)"
          "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Sign EXE (Certum SimplySign)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        env:
          WIN_CERTUM_LOGIN: ${{ secrets.WIN_CERTUM_LOGIN }}
          WIN_CERTUM_PASSWORD: ${{ secrets.WIN_CERTUM_PASSWORD }}
          WIN_CERTUM_KEY_ALIAS: ${{ secrets.WIN_CERTUM_KEY_ALIAS }}
        run: |
          Invoke-WebRequest -Uri "https://github.com/ebourg/jsign/releases/download/7.1/jsign-7.1.jar" -OutFile jsign.jar
          java -jar jsign.jar `
            --storetype CERTUM_API `
            --keystore "$env:WIN_CERTUM_LOGIN" `
            --storepass "$env:WIN_CERTUM_PASSWORD" `
            --certfile ".github/certum-chain.pem" `
            --alias "$env:WIN_CERTUM_KEY_ALIAS" `
            --tsaurl "http://time.certum.pl" `
            "${{ steps.find-exe.outputs.path }}"

      - name: Upload signed EXE to GitHub Release
        if: matrix.rid == 'win-x64' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-exe.outputs.path }}

